# 推送 v* 标签时，构建嵌入前端的 Windows / Linux 制品并发布到 GitHub Release
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          set -eux
          cd frontend
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Build binaries
        run: |
          set -eux
          mkdir -p out
          cd backend
          export CGO_ENABLED=0
          export GOFLAGS="-trimpath"
          LDFLAGS='-s -w'
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o ../out/quotepro.exe .
          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o ../out/quotepro .

      - name: Pack archives
        run: |
          set -eux
          V="${{ github.ref_name }}"
          STAGE_WIN="rel/${V}-windows-amd64"
          STAGE_LIN="rel/${V}-linux-amd64"
          mkdir -p "$STAGE_WIN" "$STAGE_LIN" dist
          install -m0644 out/quotepro.exe "$STAGE_WIN/quotepro.exe"
          install -m0755 out/quotepro "$STAGE_LIN/quotepro"
          install -m0644 config.example.yaml "$STAGE_WIN/config.example.yaml"
          install -m0644 config.example.yaml "$STAGE_LIN/config.example.yaml"
          install -m0644 packaging/README-RELEASE.txt "$STAGE_WIN/README.txt"
          install -m0644 packaging/README-RELEASE.txt "$STAGE_LIN/README.txt"
          (cd rel && zip -r "../dist/quotepro-${V}-windows-amd64.zip" "${V}-windows-amd64")
          tar -czf "dist/quotepro-${V}-linux-amd64.tar.gz" -C rel "${V}-linux-amd64"

      - name: SHA256 checksums
        run: |
          set -eux
          cd dist
          sha256sum quotepro-*.zip quotepro-*.tar.gz | tee SHA256SUMS
          sha256sum -c SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/quotepro-${{ github.ref_name }}-windows-amd64.zip
            dist/quotepro-${{ github.ref_name }}-linux-amd64.tar.gz
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
